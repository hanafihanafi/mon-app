<!DOCTYPE html>

                        <style>
                            :root {
                                  --bg: #0f0f1a;
                                        --surface: #1a1a2e;
                                              --card: #16213e;
                                                    --accent: #e94560;
                                                          --accent2: #f5a623;
                                                                --text: #eaeaea;
                                                                      --muted: #6b7280;
                                                                            --border: #2a2a4a;
                                                                                  --radius: 16px;
                                                                                      }

                                                                                          * { box-sizing: border-box; margin: 0; padding: 0; }

                                                                                              body {
                                                                                                    font-family: 'Syne', sans-serif;
                                                                                                          background: var(--bg);
                                                                                                                color: var(--text);
                                                                                                                      min-height: 100dvh;
                                                                                                                            display: flex;
                                                                                                                                  flex-direction: column;
                                                                                                                                        align-items: center;
                                                                                                                                              justify-content: center;
                                                                                                                                                    padding: 24px;
                                                                                                                                                          background-image:
                                                                                                                                                                  radial-gradient(ellipse at 20% 20%, rgba(233, 69, 96, 0.12) 0%, transparent 60%),
                                                                                                                                                                          radial-gradient(ellipse at 80% 80%, rgba(245, 166, 35, 0.08) 0%, transparent 60%);
                                                                                                                                                                              }

                                                                                                                                                                                  .badge-pwa {
                                                                                                                                                                                        position: fixed;
                                                                                                                                                                                              top: 16px;
                                                                                                                                                                                                    right: 16px;
                                                                                                                                                                                                          background: var(--accent);
                                                                                                                                                                                                                color: white;
                                                                                                                                                                                                                      font-family: 'Space Mono', monospace;
                                                                                                                                                                                                                            font-size: 10px;
                                                                                                                                                                                                                                  padding: 4px 10px;
                                                                                                                                                                                                                                        border-radius: 999px;
                                                                                                                                                                                                                                              letter-spacing: 1px;
                                                                                                                                                                                                                                                    text-transform: uppercase;
                                                                                                                                                                                                                                                          opacity: 0;
                                                                                                                                                                                                                                                                animation: fadeIn 0.6s 1s forwards;
                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                        .card {
                                                                                                                                                                                                                                                                              background: var(--card);
                                                                                                                                                                                                                                                                                    border: 1px solid var(--border);
                                                                                                                                                                                                                                                                                          border-radius: var(--radius);
                                                                                                                                                                                                                                                                                                padding: 40px 32px;
                                                                                                                                                                                                                                                                                                      width: 100%;
                                                                                                                                                                                                                                                                                                            max-width: 400px;
                                                                                                                                                                                                                                                                                                                  box-shadow: 0 24px 80px rgba(0,0,0,0.4);
                                                                                                                                                                                                                                                                                                                        animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                .title {
                                                                                                                                                                                                                                                                                                                                      font-size: 13px;
                                                                                                                                                                                                                                                                                                                                            font-family: 'Space Mono', monospace;
                                                                                                                                                                                                                                                                                                                                                  color: var(--accent);
                                                                                                                                                                                                                                                                                                                                                        text-transform: uppercase;
                                                                                                                                                                                                                                                                                                                                                              letter-spacing: 3px;
                                                                                                                                                                                                                                                                                                                                                                    margin-bottom: 8px;
                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                            h1 {
                                                                                                                                                                                                                                                                                                                                                                                  font-size: 32px;
                                                                                                                                                                                                                                                                                                                                                                                        font-weight: 800;
                                                                                                                                                                                                                                                                                                                                                                                              line-height: 1.1;
                                                                                                                                                                                                                                                                                                                                                                                                    margin-bottom: 32px;
                                                                                                                                                                                                                                                                                                                                                                                                          background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
                                                                                                                                                                                                                                                                                                                                                                                                                -webkit-background-clip: text;
                                                                                                                                                                                                                                                                                                                                                                                                                      -webkit-text-fill-color: transparent;
                                                                                                                                                                                                                                                                                                                                                                                                                            background-clip: text;
                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                    .inputs {
                                                                                                                                                                                                                                                                                                                                                                                                                                          display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                                                                align-items: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                      gap: 12px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                            margin-bottom: 24px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .plus {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          font-size: 28px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-weight: 800;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      color: var(--accent);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            flex-shrink: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  line-height: 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .field {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                flex: 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            flex-direction: column;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  gap: 6px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          label {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-family: 'Space Mono', monospace;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      font-size: 11px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            color: var(--muted);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  text-transform: uppercase;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        letter-spacing: 1px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                input[type="number"] {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      width: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            background: var(--surface);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  border: 1.5px solid var(--border);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        border-radius: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              color: var(--text);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-family: 'Space Mono', monospace;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          font-size: 22px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-weight: 700;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      padding: 14px 16px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            text-align: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  outline: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        transition: border-color 0.2s, box-shadow 0.2s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              -moz-appearance: textfield;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      input[type="number"]::-webkit-inner-spin-button,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              input[type="number"]:focus {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    border-color: var(--accent);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  button {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        width: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              padding: 16px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    background: var(--accent);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          color: white;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-family: 'Syne', sans-serif;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      font-size: 16px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            font-weight: 700;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  border: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        border-radius: 12px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    letter-spacing: 0.5px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                box-shadow: 0 4px 20px rgba(233, 69, 96, 0.35);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      margin-bottom: 20px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              button:active {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    transform: scale(0.97);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          box-shadow: 0 2px 8px rgba(233, 69, 96, 0.2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  button:hover {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        background: #c73652;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .result-box {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      background: var(--surface);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            border: 1.5px solid var(--border);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  border-radius: 12px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        padding: 20px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              text-align: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    min-height: 80px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                flex-direction: column;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      align-items: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            justify-content: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  transition: all 0.3s ease;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .result-label {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-family: 'Space Mono', monospace;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      font-size: 11px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            color: var(--muted);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  text-transform: uppercase;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        letter-spacing: 2px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              margin-bottom: 8px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
